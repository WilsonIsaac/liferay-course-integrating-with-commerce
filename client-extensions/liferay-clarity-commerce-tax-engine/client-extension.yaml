assemble:
    -   fromTask: bootJar
liferay-clarity-commerce-tax-engine:
    key: liferay-clarity-commerce-tax-engine
    name: Liferay Clarity Commerce Tax Engine
    oAuth2ApplicationExternalReferenceCode: liferay-clarity-commerce-tax-engine-oaua
    taxEngineTypeSettings:
        key1: value1
        key2: value2
        key3: value3
        key4: value4
        key5: value5
    type: commerceTaxEngine
liferay-clarity-commerce-tax-engine-oaua:
    .serviceAddress: localhost:58081
    .serviceScheme: http
    name: Liferay Clarity Commerce Tax Engine OAuth Application User Agent
    scopes:
        -   Liferay.Headless.Admin.Workflow.everything
    type: oAuthApplicationUserAgent